<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Frontend Shell - Arena Cricket</title>
    <style>
      body { font-family: Arial, Helvetica, sans-serif; background:#0f172a; color:#f8fafc; margin:0 }
      header { padding:16px; display:flex; gap:12px; align-items:center; background:#0b1220 }
      a.button { padding:8px 12px; background:#0ea5a4; color:#042029; text-decoration:none; border-radius:6px }
      main { padding:12px }
      .frame { width:100%; height:80vh; border:0; background:white }
      .notice { font-size:0.9rem; color:#94a3b8 }
    </style>
  </head>
  <body>
    <header>
      <h3 style="margin:0">Frontend Shell</h3>
      <nav style="margin-left:12px">
        <a class="button" href="#" onclick="show('cricket')">Booking</a>
        <a class="button" href="#" onclick="show('admin')">Admin</a>
        <a class="button" href="#" onclick="show('register')">Register</a>
      </nav>
      <div style="margin-left:auto" class="notice">Make sure each app's dev server is running (ports 3000,3001,3002)</div>
    </header>
    <main>
      <iframe id="cricket" class="frame" src="http://localhost:3000" style="display:block"></iframe>
      <iframe id="admin" class="frame" src="http://localhost:3001" style="display:none"></iframe>
      <iframe id="register" class="frame" src="http://localhost:3002" style="display:none"></iframe>
    </main>
    <script>
      function show(id){ ['cricket','admin','register'].forEach(i=>{
        document.getElementById(i).style.display = (i===id)?'block':'none';
      }) }
    </script>
  </body>
</html>
